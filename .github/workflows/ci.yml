name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: System deps (libsndfile for soundfile)
        run: sudo apt-get update && sudo apt-get install -y libsndfile1
      - name: Python deps
        run: pip install numpy scipy soundfile reedsolo pytest ruff
      - name: Lint (pyflakes)
        run: ruff check --select F scripts/ tests/
      - name: Tests
        run: pytest tests/ -q
